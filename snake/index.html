<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Home</a>

    <div class="container">
        <h1>SNAKE</h1>

        <div class="hud">
            <span>Score: <span id="score">0</span></span>
            <span>Level: <span id="level">1</span></span>
            <span>Lives: <span id="lives">❤️❤️❤️</span></span>
            <span>Next level at: <span id="target">20</span> pts</span>
            <span>Mode: <span id="diff-mode">—</span></span>
        </div>

        <div id="powerup-status"></div>

        <div class="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="dpad">
            <div></div>
            <button id="dUp" aria-label="Up">▲</button>
            <div></div>
            <button id="dLeft" aria-label="Left">◀</button>
            <div id="dCenter"></div>
            <button id="dRight" aria-label="Right">▶</button>
            <div></div>
            <button id="dDown" aria-label="Down">▼</button>
            <div></div>
        </div>

        <div class="legend">
            <div class="legend-item"><span class="legend-icon apple">🍎</span> Apple — 1 point</div>
            <div class="legend-item"><span class="legend-icon cherry">🍒</span> Cherry — 3 points</div>
            <div class="legend-item"><span class="legend-icon mushroom">🍄</span> Mushroom — slows snake</div>
            <div class="legend-item"><span class="legend-icon star">⭐</span> Star — pass through once</div>
        </div>
    </div>

    <!-- Message overlay -->
    <div id="message" class="hidden">
        <div id="message-title"></div>
        <div id="message-body"></div>
        <!-- shown only on the start/game-over screen when picking difficulty -->
        <div id="diff-buttons" class="hidden">
            <button id="btn-easy"   class="diff-btn diff-easy">EASY</button>
            <button id="btn-medium" class="diff-btn diff-medium">MEDIUM</button>
            <button id="btn-hard"   class="diff-btn diff-hard">HARD</button>
        </div>
        <!-- shown for level-up / paused confirmations -->
        <button id="message-btn" class="hidden"></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
