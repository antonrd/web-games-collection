<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="../index.html" class="back-link">← Back to Home</a>
    <div class="container">
        <h1>Pac-Man</h1>
        <div class="hud">
            <span>Score: <span id="score">0</span></span>
            <span>Lives: <span id="lives">3</span></span>
            <span>Level: <span id="level">1</span></span>
            <span>Time: <span id="timer">00:00</span></span>
        </div>
        <div id="powerup-status"></div>
        <canvas id="gameCanvas"></canvas>
        <div id="message" class="hidden"></div>
        <div id="dpad">
            <div></div>
            <button id="dUp">↑</button>
            <div></div>
            <button id="dLeft">←</button>
            <div id="dCenter"></div>
            <button id="dRight">→</button>
            <div></div>
            <button id="dDown">↓</button>
            <div></div>
        </div>
        <p class="instructions">Arrow keys or WASD to move. Eat all dots to advance! Space to pause.</p>
        <div class="legend">
            <span class="legend-item"><span class="legend-icon star">★</span> Freeze ghosts (5s)</span>
            <span class="legend-item"><span class="legend-icon diamond">◆</span> Fire trail (10s)</span>
            <span class="legend-item"><span class="legend-icon banana">🍌</span> Ghost form (10s)</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
